    <style>
    body.sidebarAutoHide:not(.sidebarHover):not(.sidebarOpen) .sidebar {
      transform: translateX(calc(-100% + 18px)) !important;
      transition: transform 180ms ease !important;
    }
    body.sidebarAutoHide.sidebarHover .sidebar,
    body.sidebarAutoHide.sidebarOpen .sidebar {
      transform: translateX(0) !important;
      transition: transform 180ms ease !important;
    }
    body.sidebarAutoHide .content {
      margin-left: 22px !important;
      padding-left: 18px !important;
      transition: margin-left 180ms ease, padding 180ms ease !important;
    }
    body.sidebarAutoHide.sidebarHover .content,
    body.sidebarAutoHide.sidebarOpen .content {
      margin-left: 146px !important;
      padding-left: 6px !important;
    }
    </style>
    <script>
    (function() {
      let sidebarHover = false;
      function initAutoHide() {
        const sidebar = document.getElementById('sidebar');
        if (!sidebar) return;
        document.body.classList.add('sidebarAutoHide');
        document.addEventListener('mousemove', function(e) {
          if (e.clientX <= 30) {
            if (!sidebarHover) { sidebarHover = true; document.body.classList.add('sidebarHover'); }
          } else if (e.clientX > 100) {
            if (sidebarHover) { sidebarHover = false; document.body.classList.remove('sidebarHover'); }
          }
        });
        sidebar.addEventListener('mouseenter', function() { sidebarHover = true; document.body.classList.add('sidebarHover'); });
        sidebar.addEventListener('mouseleave', function() { sidebarHover = false; document.body.classList.remove('sidebarHover'); });
      }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initAutoHide); } else { initAutoHide(); }
    })();
    </script>

      <div class="content" id="content">
        <div class="cfgWrap">
          <header class="cfgHeader">
            <div>
              <div class="cfgTitle">Configuration</div>
              <div class="cfgSub muted">Manage Slack and email alert notifications.</div>
            </div>
            <div class="cfgBadge">
              <span class="dot"></span>
              <span id="cfgConn">ready</span>
              <span class="sep">·</span>
              <span class="muted" id="cfgUser">—</span>
            </div>
          </header>

          <div id="cfgErr" class="hostsErr" role="alert" style="display:none;"></div>

          <div class="cfgGrid">

            <section class="hostsCard hostsFieldWide" id="cfgNotifyCard" style="display:none;">
              <div class="hostsCardTitle">Alert notifications (admin)</div>
              <div id="cfgNotifyErr" class="hostsErr" role="alert" style="display:none;"></div>
              <div id="cfgNotifyMsg" class="muted cfgSmall" style="display:none;"></div>
              <form id="cfgNotifyForm">
                <div class="muted cfgSmall" style="margin-bottom:6px;">Slack</div>
                <div class="hostsFormGrid">
                  <div class="hostsField hostsFieldWide">
                    <label for="cfgSlackWebhook">Webhook URL</label>
                    <input id="cfgSlackWebhook" type="text" placeholder="https://hooks.slack.com/services/..." autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSlackChannel">Channel (optional)</label>
                    <input id="cfgSlackChannel" type="text" placeholder="#alerts" autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSlackSeverity">Min severity</label>
                    <select id="cfgSlackSeverity">
                      <option value="info">info</option>
                      <option value="warn">warn</option>
                      <option value="crit">crit</option>
                    </select>
                  </div>
                  <div class="hostsField">
                    <label for="cfgSlackCooldown">Cooldown (seconds)</label>
                    <input id="cfgSlackCooldown" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="hostsActions">
                  <button class="btn" type="button" id="cfgSlackTestBtn">Send test message</button>
                </div>

                <div class="muted cfgSmall" style="margin:14px 0 6px;">Email (SMTP)</div>
                <div class="hostsFormGrid">
                  <div class="hostsField">
                    <label for="cfgSmtpHost">SMTP host</label>
                    <input id="cfgSmtpHost" type="text" placeholder="smtp.example.com" autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSmtpPort">SMTP port</label>
                    <input id="cfgSmtpPort" type="number" min="1" step="1" placeholder="587" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSmtpUsername">SMTP username</label>
                    <input id="cfgSmtpUsername" type="text" autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSmtpPassword">SMTP password</label>
                    <input id="cfgSmtpPassword" type="password" placeholder="(unchanged)" autocomplete="new-password" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSmtpFrom">From address</label>
                    <input id="cfgSmtpFrom" type="text" placeholder="alerts@example.com" autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgSmtpUseTls">Use STARTTLS</label>
                    <select id="cfgSmtpUseTls">
                      <option value="1">Yes</option>
                      <option value="0">No</option>
                    </select>
                  </div>
                  <div class="hostsField hostsFieldWide">
                    <label for="cfgAlertEmailTo">Alert recipients (comma-separated)</label>
                    <input id="cfgAlertEmailTo" type="text" placeholder="ops@example.com, oncall@example.com" autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgEmailSeverity">Min severity</label>
                    <select id="cfgEmailSeverity">
                      <option value="info">info</option>
                      <option value="warn">warn</option>
                      <option value="crit">crit</option>
                    </select>
                  </div>
                  <div class="hostsField">
                    <label for="cfgEmailCooldown">Cooldown (seconds)</label>
                    <input id="cfgEmailCooldown" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="muted cfgSmall" style="margin:14px 0 6px;">Microsoft Teams</div>
                <div class="hostsFormGrid">
                  <div class="hostsField hostsFieldWide">
                    <label for="cfgTeamsWebhook">Webhook URL</label>
                    <input id="cfgTeamsWebhook" type="text" placeholder="https://outlook.office.com/webhook/..." autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgTeamsSeverity">Min severity</label>
                    <select id="cfgTeamsSeverity">
                      <option value="info">info</option>
                      <option value="warn">warn</option>
                      <option value="crit">crit</option>
                    </select>
                  </div>
                  <div class="hostsField">
                    <label for="cfgTeamsCooldown">Cooldown (seconds)</label>
                    <input id="cfgTeamsCooldown" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="hostsActions">
                  <button class="btn" type="button" id="cfgTeamsTestBtn">Send test message</button>
                </div>

                <div class="muted cfgSmall" style="margin:14px 0 6px;">Discord</div>
                <div class="hostsFormGrid">
                  <div class="hostsField hostsFieldWide">
                    <label for="cfgDiscordWebhook">Webhook URL</label>
                    <input id="cfgDiscordWebhook" type="text" placeholder="https://discord.com/api/webhooks/..." autocomplete="off" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgDiscordSeverity">Min severity</label>
                    <select id="cfgDiscordSeverity">
                      <option value="info">info</option>
                      <option value="warn">warn</option>
                      <option value="crit">crit</option>
                    </select>
                  </div>
                  <div class="hostsField">
                    <label for="cfgDiscordCooldown">Cooldown (seconds)</label>
                    <input id="cfgDiscordCooldown" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="hostsActions">
                  <button class="btn" type="button" id="cfgDiscordTestBtn">Send test message</button>
                </div>

                <div class="muted cfgSmall" style="margin:14px 0 6px;">PagerDuty</div>
                <div class="hostsFormGrid">
                  <div class="hostsField hostsFieldWide">
                    <label for="cfgPagerdutyRoutingKey">Events API v2 routing key</label>
                    <input id="cfgPagerdutyRoutingKey" type="password" placeholder="(unchanged)" autocomplete="new-password" />
                  </div>
                  <div class="hostsField">
                    <label for="cfgPagerdutySeverity">Min severity</label>
                    <select id="cfgPagerdutySeverity">
                      <option value="info">info</option>
                      <option value="warn">warn</option>
                      <option value="crit">crit</option>
                    </select>
                  </div>
                  <div class="hostsField">
                    <label for="cfgPagerdutyCooldown">Cooldown (seconds)</label>
                    <input id="cfgPagerdutyCooldown" type="number" min="0" step="1" />
                  </div>
                </div>
                <div class="hostsActions">
                  <button class="btn" type="button" id="cfgPagerdutyTestBtn">Send test alert</button>
                </div>

                <div class="hostsActions">
                  <button class="btn" type="button" id="cfgEmailTestBtn">Send test email</button>
                  <button class="btn" type="submit" id="cfgNotifySaveBtn">Save notification settings</button>
                  <button class="btn" type="button" id="cfgTestAllBtn">Test all channels</button>
                </div>
              </form>
            </section>

          </div>
        </div>
      </div>
    </div>
