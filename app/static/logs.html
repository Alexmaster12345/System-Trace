<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Trace · System Logs</title>
    <link rel="stylesheet" href="/static/assets/dashboard.css?v=20260615_1" />
    <link rel="stylesheet" href="/static/assets/logs.css?v=20260310_1" />
    <script defer src="/static/assets/sidebar.js?v=1"></script>
    <script defer src="/static/assets/dashboard.js?v=20260615_1"></script>
    <script defer src="/static/assets/logs.js?v=20260221_1"></script>
  </head>
  <body class="sidebarAutoHide">
    <div class="appShell">
      <aside class="sidebar" id="sidebar" aria-label="Navigation">
        <div class="sideTop">
          <div class="brandRow">
            <div class="brandMark" aria-hidden="true"><span class="brandMarkDot"></span></div>
            <div class="brandBlock">
              <div class="brand">Enterprise Admin</div>
              <div class="brandSub">Infrastructure MGMT</div>
            </div>
          </div>
          <div class="sideSearchWrap">
            <input id="sideSearch" class="sideSearch" placeholder="Search infrastructure..." autocomplete="off" />
          </div>
        </div>
        <nav class="sideNav" id="sideNav" aria-label="Main">
          <div class="sideGroup">
            <a class="sideItem" href="/" data-action="dashboard" data-label="Dashboard"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span> Dashboard</a>
            <a class="sideItem" href="/hosts" data-action="hosts" data-label="Servers"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="2"/><rect x="2" y="11" width="20" height="5" rx="2"/><circle cx="6" cy="5.5" r="1" fill="currentColor"/><circle cx="6" cy="13.5" r="1" fill="currentColor"/></svg></span> Servers</a>
            <a class="sideItem" href="/maps" data-action="maps" data-label="Network"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span> Network</a>
            <a class="sideItem" href="/inventory" data-action="inventory" data-label="Inventory"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span> Inventory</a>
            <a class="sideItem" href="/configuration" data-action="configuration" data-label="Configuration"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Configuration</a>
            <a class="sideItem" href="/info" data-action="info" data-label="Info"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span> Info</a>
            <a class="sideItem" href="/logs" data-action="logs" data-label="Logs" aria-current="page"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span> Logs</a>
          </div>
          <div class="sideGroup">
            <div class="sideGroupTitle">Administration</div>
            <a class="sideItem" href="/users" data-action="users" data-label="Users">Users</a>
            <a class="sideItem" href="/user-groups" data-action="user-groups" data-label="User groups">User groups</a>
          </div>
        </nav>
        <div class="sideBottom" aria-label="Secondary">
          <button class="themeToggleBtn" id="themeToggleBtn" type="button" aria-label="Toggle light/dark theme"></button>
          <button class="supportTicketBtn" type="button">🎫 Support Ticket</button>
          <form class="sideLogout" method="post" action="/logout">
            <button class="sideItem sideBtn" type="submit" data-action="logout"><span class="sideIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Sign out</button>
          </form>
        </div>
      </aside>

      <main class="content mainContent" id="mainContent">
        <div class="logsWrap">
          <header class="logsHeader">
            <div class="logsHeaderLeft">
              <a class="logsBack" href="/">← Dashboard</a>
              <div>
                <div class="logsTitle">System Logs</div>
                <div class="logsSub muted">Real-time event and problem log</div>
              </div>
            </div>
            <div class="logsHeaderRight">
              <select id="logsLevelFilter" class="logsSelect">
                <option value="">All levels</option>
                <option value="crit">Critical</option>
                <option value="warn">Warning</option>
                <option value="info">Info</option>
              </select>
              <input id="logsHostFilter" class="logsInput" placeholder="Filter by host…" autocomplete="off" />
              <button id="logsClearBtn" class="logsBtnDanger">Clear all</button>
              <button id="logsRefreshBtn" class="logsBtn">↻ Refresh</button>
              <span class="logsConnBadge"><span class="dot"></span><span id="logsConn">loading…</span></span>
            </div>
          </header>

          <div id="logsErr" class="hostsErr" role="alert" style="display:none;"></div>

          <!-- Summary bar -->
          <div class="logsSummary">
            <div class="logsSumTile crit"><span id="sumCrit">0</span><span class="logsSumLabel">Critical</span></div>
            <div class="logsSumTile warn"><span id="sumWarn">0</span><span class="logsSumLabel">Warning</span></div>
            <div class="logsSumTile info"><span id="sumInfo">0</span><span class="logsSumLabel">Info</span></div>
            <div class="logsSumTile total"><span id="sumTotal">0</span><span class="logsSumLabel">Total</span></div>
          </div>

          <!-- Log table -->
          <div class="logsTableWrap">
            <table class="logsTable">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Level</th>
                  <th>Host</th>
                  <th>IP</th>
                  <th>Source</th>
                  <th>Message</th>
                </tr>
              </thead>
              <tbody id="logsTbody">
                <tr><td colspan="6" class="logsEmpty muted">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script>
      // Sidebar auto-hide
      (function() {
        const s = document.getElementById('sidebar');
        const m = document.getElementById('mainContent');
        if (!s || !m) return;
        function check() {
          if (window.innerWidth < 900) { s.style.display = 'none'; m.style.marginLeft = '0'; }
          else { s.style.display = ''; m.style.marginLeft = ''; }
        }
        check();
        window.addEventListener('resize', check);
      })();
    </script>
  </body>
</html>
